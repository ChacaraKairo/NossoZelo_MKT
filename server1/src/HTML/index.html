<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Servidor Ativo | NossoZelo</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        height: 100vh;
        background: linear-gradient(
          to right,
          #e0f7fa,
          #ffffff
        );
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana,
          sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #044b4b;
      }

      .container {
        background-color: #ffffff;
        border-radius: 20px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        padding: 60px 80px;
        text-align: center;
        max-width: 700px;
        width: 90%;
      }

      .logo {
        margin-bottom: 30px;
      }

      .logo img {
        height: 80px;
      }

      .titulo {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #009688;
      }

      .subtitulo {
        font-size: 18px;
        margin-bottom: 30px;
        color: #555;
      }

      .status-box {
        background-color: #e0f2f1;
        border-left: 8px solid #009688;
        padding: 20px;
        border-radius: 10px;
        font-size: 20px;
        font-weight: bold;
        color: #00695c;
      }

      .footer {
        margin-top: 40px;
        font-size: 14px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <!-- Substitua abaixo pelo caminho da sua logo -->
        <img
          src="1-removebg-preview.png"
          alt="Logo NossoZelo"
        />
      </div>

      <div class="titulo">Servidor em Execução</div>
      <div class="subtitulo">
        NossoZelo está online e pronto para cuidar do que
        importa!
      </div>

      <div class="status-box">
        ✅ Conexão ativa com sucesso.<br />
        Aguarde requisições pela aplicação.
      </div>

      <div class="footer">
        &copy; 2025 NossoZelo • Todos os direitos
        reservados.
      </div>
    </div>
  </body>
</html>
