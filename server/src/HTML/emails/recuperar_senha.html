<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Recuperação de Senha</title>
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 8px;
      "
    >
      <h2>Olá, {{nome}}</h2>
      <p>Você solicitou a redefinição de senha.</p>
      <a
        href="{{link}}"
        style="
          background-color: #4caf50;
          color: white;
          padding: 10px 20px;
          text-decoration: none;
        "
        >Redefinir Senha</a
      >
      <p>Este link expira em 15 minutos.</p>
    </div>
  </body>
</html>
