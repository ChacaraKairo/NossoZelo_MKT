name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/nossozelo_ci
      JWT_SECRET: ci-jwt-secret-with-at-least-32-characters
      ALLOWED_ORIGINS: http://localhost:3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test
      - run: npm run build

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  controlador:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: controlador
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/nossozelo_ci
      JWT_SECRET: ci-admin-secret-with-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: controlador/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm test
      - run: npm run lint
      - run: npm run build

  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
