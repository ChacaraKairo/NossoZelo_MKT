name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint
        env:
          JWT_SECRET: segredo-de-ci-com-mais-de-32-caracteres
          PAYMENT_GATEWAY: disabled
      - run: npm test
        env:
          JWT_SECRET: segredo-de-ci-com-mais-de-32-caracteres
          PAYMENT_GATEWAY: disabled
      - run: npm run build
        env:
          JWT_SECRET: segredo-de-ci-com-mais-de-32-caracteres
          PAYMENT_GATEWAY: disabled

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
