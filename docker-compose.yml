services:
  # docker-compose up --build
  db:
    image: mysql:8.4
    container_name: nossozelo_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: nossozelo123
      MYSQL_DATABASE: db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nossozelo_network

  backend:
    build: ./server
    container_name: nossozelo_backend
    restart: always
    command: sh -c "npx prisma db push && npm run dev"
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: mysql://root:nossozelo123@db:3306/db
      ENABLE_AIVEN_KEEP_ALIVE: 'false'
      NODE_ENV: development
      PORT: 4000
      API_URL: http://localhost:4000
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nossozelo_network

  frontend:
    build: ./client
    container_name: nossozelo_frontend
    restart: always
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - nossozelo_network

networks:
  nossozelo_network:
    driver: bridge

volumes:
  mysql_data:
