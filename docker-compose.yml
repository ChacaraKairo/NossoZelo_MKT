services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: nossozelo
      MYSQL_USER: nossozelo
      MYSQL_PASSWORD: nossozelo
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: mysql://nossozelo:nossozelo@mysql:3306/nossozelo
      JWT_SECRET: troque-por-uma-chave-com-pelo-menos-32-caracteres
      FRONTEND_URL: http://localhost:3000
      BACKEND_PUBLIC_URL: http://localhost:4000
      ALLOWED_ORIGINS: http://localhost:3000
      PAYMENT_GATEWAY: disabled
      ENABLE_ADMIN_CRUD: "false"
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/server.js"

  frontend:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  mysql_data:
